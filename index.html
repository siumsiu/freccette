<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Freccette NFC PRO</title>

<style>
:root {
    --bg-dark: #121212;
    --card-bg: #1e1e1e;
    --accent: #00c853;
    --accent-hover: #00e676;
    --danger: #d50000;
    --warning: #ffd600;
    --text: #ffffff;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    text-align: center;
    padding-bottom: 30px;
}

.container {
    padding: 15px;
    max-width: 480px; /* Perfetto per smartphone */
    margin: auto;
    box-sizing: border-box;
}

h1 { color: var(--accent); margin-bottom: 5px; font-size: 2rem; }
h2 { margin: 15px 0 10px 0; font-size: 1.4rem; }

/* Form e Input touch-friendly */
input, select, button {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    box-sizing: border-box;
    outline: none;
}

input, select {
    background: var(--card-bg);
    color: var(--text);
    border: 2px solid #333;
    text-align: center;
}

input:focus { border-color: var(--accent); }

button {
    background: var(--accent);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    touch-action: manipulation;
}

button:active { transform: scale(0.98); }
.btn-secondary { background: #333; }
.btn-danger { background: var(--danger); }

/* Lista Giocatori Configurazione */
.player-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
}

/* Griglia e Barre di Stato */
.statusBar {
    background: var(--card-bg);
    padding: 12px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    margin: 15px 0;
    border-left: 5px solid var(--accent);
}

.arrow-indicator {
    background: #333;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-left: 5px;
}

/* Lista Giocatori In-Game */
.player-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
}

.player-card {
    background: var(--card-bg);
    padding: 14px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 2px solid transparent;
    transition: all 0.3s ease;
}

/* Evidenziazione netta del giocatore di turno */
.player-card.current {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(0, 200, 83, 0.4);
    background: #232d25;
    transform: scale(1.02);
}

.player-card.current .score {
    color: var(--accent-hover);
}

.player-info { text-align: left; }
.player-name { font-size: 1.1rem; font-weight: bold; }
.player-rank { font-size: 0.85rem; color: #aaa; }

.score {
    font-size: 2rem;
    font-weight: 900;
    font-family: monospace;
}

/* Sezione Tiro Rapido */
.throw-section {
    background: #252525;
    padding: 15px;
    border-radius: 20px;
    margin-top: 15px;
    position: sticky;
    bottom: 10px; /* Rimane comodo vicino al pollice */
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
}

.history-box {
    background: rgba(0,0,0,0.2);
    padding: 8px;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #bbb;
    max-height: 60px;
    overflow-y: auto;
    margin-bottom: 10px;
}

/* Animazione Vittoria */
@keyframes celebrate {
    0% { transform: scale(1); background: gold; }
    50% { transform: scale(1.1); background: #ffea00; }
    100% { transform: scale(1); background: gold; }
}
.winner-screen {
    animation: celebrate 1s infinite alternate;
    color: black !important;
    padding: 30px !important;
    border-radius: 20px;
}
</style>
</head>
<body>

<div class="container">

    <div id="setup">
        <h1>🎯 Freccette NFC</h1>
        <p style="color: #aaa; margin-top:0;">Ottimizzato per Smartphone</p>

        <label>Punteggio iniziale</label>
        <select id="startScore">
            <option value="301" selected>301 (Consigliato)</option>
            <option value="501">501</option>
            <option value="701">701</option>
        </select>

        <label>Modalità di Gioco</label>
        <select id="gameMode">
            <option value="normal">Classica</option>
            <option value="tournament">Torneo (Eliminazione diretta)</option>
        </select>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <label style="margin:0;">Giocatori (2-20)</label>
            <button type="button" onclick="adjustPlayers(1)" style="width:50px; padding:8px; margin:0;">+</button>
            <button type="button" onclick="adjustPlayers(-1)" style="width:50px; padding:8px; margin:0;">-</button>
        </div>
        
        <div id="playersNamesContainer" style="margin-top: 10px;"></div>

        <button onclick="startGame()" style="margin-top:20px; background: var(--accent);">Inizia Partita</button>
    </div>

    <div id="game" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1 style="font-size: 1.5rem; margin:0;">🎯 In Corso</h1>
            <button onclick="exitGame()" class="btn-secondary" style="width:auto; margin:0; padding:8px 15px; font-size:14px;">Esci</button>
        </div>

        <div class="statusBar" id="statusBar">
            Turno di: <span id="currentTurnName" style="color:var(--accent-hover);"></span>
            <div style="margin-top: 5px; font-size: 0.9rem; color: #ccc;">
                Stato: <span id="arrowProgress" class="arrow-indicator">Freccia 1/3</span>
            </div>
        </div>

        <h2>Classifica Live</h2>
        <div id="players" class="player-list"></div>

        <div class="throw-section">
            <div class="history-box" id="historyBox">Cronologia tiri: Nessuno</div>
            
            <input id="throwInput" type="number" inputmode="numeric" min="0" max="180" pattern="[0-9]*" placeholder="Punti ottenuti (es. 26)" autocomplete="off">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="undoLastThrow()" class="btn-secondary" style="flex: 1; padding: 14px;">↩ Annulla</button>
                <button onclick="addThrow()" style="flex: 2; padding: 14px;">Invia Tiro 🎯</button>
            </div>
        </div>
    </div>

    <div id="statsScreen" style="display:none;">
        <div id="winnerBanner" class="winner-screen"></div>
        <h2>Classifica Finale e Statistiche</h2>
        <div id="statsList" class="player-list"></div>
        <button onclick="resetToSetup()" style="background: var(--accent); margin-top:20px;">Nuova Partita</button>
    </div>

</div>

<script>
let players = [];
let currentPlayer = 0;
let throws = 0;
let startPoints = 301;
let gameMode = 'normal';
let wakeLock = null;
let gameHistory = []; // Per l'annullamento dei tiri e statistiche

// Gestione dinamica dei campi nome giocatore (Max 20)
function generatePlayerFields(count) {
    const container = document.getElementById("playersNamesContainer");
    container.innerHTML = "";
    let savedNames = JSON.parse(localStorage.getItem('darts_saved_names')) || [];
    
    for (let i = 0; i < count; i++) {
        const div = document.createElement("div");
        div.className = "player-input-row";
        
        const input = document.createElement("input");
        input.type = "text";
        input.id = `pName_${i}`;
        input.placeholder = `Giocatore ${i + 1}`;
        input.value = savedNames[i] || `Giocatore ${i + 1}`;
        input.maxLength = 15;
        
        div.appendChild(input);
        container.appendChild(div);
    }
}

function adjustPlayers(amount) {
    let currentCount = document.querySelectorAll("#playersNamesContainer .player-input-row").length || 2;
    let newCount = currentCount + amount;
    if (newCount >= 2 && newCount <= 20) {
        generatePlayerFields(newCount);
    }
}

// Richiesta dello schermo sempre acceso (Wake Lock API)
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.log("Wake Lock non supportato o declinato:", err.message);
    }
}

function releaseWakeLock() {
    if (wakeLock !== null) {
        wakeLock.release();
        wakeLock = null;
    }
}

// Inizio Partita
function startGame() {
    const fields = document.querySelectorAll("#playersNamesContainer input");
    startPoints = parseInt(document.getElementById("startScore").value);
    gameMode = document.getElementById("gameMode").value;
    
    players = [];
    gameHistory = [];
    currentPlayer = 0;
    throws = 0;

    let namesToSave = [];
    fields.forEach((field, index) => {
        let name = field.value.trim();
        if(!name) name = `Giocatore ${index + 1}`;
        namesToSave.push(name);
        
        players.push({
            id: index,
            name: name,
            score: startPoints,
            initialScore: startPoints,
            totalThrows: 0,
            history: [],
            isEliminated: false
        });
    });

    localStorage.setItem('darts_saved_names', JSON.stringify(namesToSave));

    document.getElementById("setup").style.display = "none";
    document.getElementById("statsScreen").style.display = "none";
    document.getElementById("game").style.display = "block";

    requestWakeLock();
    saveGameState();
    updateUI();
}

// Aggiornamento Interfaccia Grafica e Classifica Live Ordinata
function updateUI() {
    if (players.length === 0) return;

    let activePlayer = players[currentPlayer];
    document.getElementById("currentTurnName").innerText = activePlayer.name;
    document.getElementById("arrowProgress").innerText = `Freccia ${throws + 1}/3`;

    // Generazione classifica live (cloniamo per ordinare senza rompere i turni indicizzati)
    let sortedPlayers = [...players].sort((a, b) => {
        if (a.isEliminated && !b.isEliminated) return 1;
        if (!a.isEliminated && b.isEliminated) return -1;
        return a.score - b.score; // Vince chi ha il punteggio più basso (vicino a 0)
    });

    let html = "";
    sortedPlayers.forEach((p, idx) => {
        let isCurrent = p.id === activePlayer.id;
        let statusText = p.isEliminated ? "ELIMINATO" : `Pos. #${idx + 1}`;
        
        html += `
        <div class="player-card ${isCurrent ? 'current' : ''}" style="${p.isEliminated ? 'opacity:0.4;' : ''}">
            <div class="player-info">
                <div class="player-name">${p.name} ${isCurrent ? '🎯' : ''}</div>
                <div class="player-rank">${statusText}</div>
            </div>
            <div class="score">${p.isEliminated ? '❌' : p.score}</div>
        </div>
        `;
    });

    document.getElementById("players").innerHTML = html;

    // Aggiorna box della cronologia tiri del giocatore attuale
    let historyBox = document.getElementById("historyBox");
    if(activePlayer.history.length > 0) {
        historyBox.innerText = `Ultimi tiri di ${activePlayer.name}: [${activePlayer.history.slice(-6).join(", ")}]`;
    } else {
        historyBox.innerText = `Cronologia tiri di ${activePlayer.name}: Nessuno`;
    }
}

// Aggiungi un singolo tiro
function addThrow() {
    const input = document.getElementById("throwInput");
    let value = parseInt(input.value);

    // Validazione input smartphone
    if (isNaN(value) || value < 0 || value > 180) {
        alert("Inserisci un punteggio valido tra 0 e 180");
        input.value = "";
        return;
    }

    let player = players[currentPlayer];
    let oldScore = player.score;
    let newScore = player.score - value;

    // Salvataggio nello storico globale per "Annulla"
    gameHistory.push({
        playerId: player.id,
        scoreBefore: oldScore,
        throwValue: value,
        throwsState: throws,
        currentPlayerIndex: currentPlayer,
        wasResetBySbam: null // Traccia se questo tiro ha resettato qualcun altro
    });

    // Regola del Sballo (Bust) standard o rimbalzo inverso personalizzato del codice originale
    if (newScore < 0) {
        let excess = Math.abs(newScore);
        player.score = excess; // Mantiene la logica personalizzata del codice originale
    } else {
        player.score = newScore;
    }

    player.history.push(value);
    player.totalThrows++;

    // Controllo Vittoria
    if (player.score === 0) {
        endGame(player);
        return;
    }

    // REGOLA SPECIALE PAREGGIO: Se eguagli il punteggio di un avversario, lo rimandi al punteggio iniziale
    players.forEach((p) => {
        if (p.id !== player.id && !p.isEliminated && p.score === player.score && player.score !== startPoints) {
            let lastHistoryEntry = gameHistory[gameHistory.length - 1];
            lastHistoryEntry.wasResetBySbam = { targetId: p.id, oldScore: p.score };
            
            p.score = startPoints;
            alert(`💥 SBAM! ${player.name} ha raggiunto ${p.name}. ${p.name} torna a ${startPoints} punti!`);
        }
    });

    // Avanzamento freccia e turni
    throws++;
    if (throws === 3) {
        moveToNextPlayer();
    }

    input.value = "";
    saveGameState();
    updateUI();
    input.focus(); // Mantiene la tastiera aperta sul telefono
}

function moveToNextPlayer() {
    throws = 0;
    let attempts = 0;
    do {
        currentPlayer++;
        if (currentPlayer >= players.length) {
            currentPlayer = 0;
        }
        attempts++;
    } while (players[currentPlayer].isEliminated && attempts <= players.length);
}

// Funzione Annulla Ultimo Tiro (Undo)
function undoLastThrow() {
    if (gameHistory.length === 0) {
        alert("Nessun tiro da annullare.");
        return;
    }

    let lastAction = gameHistory.pop();
    let player = players.find(p => p.id === lastAction.playerId);

    // Ripristina punteggio e storico del tiratore
    player.score = lastAction.scoreBefore;
    player.history.pop();
    player.totalThrows--;

    // Ripristina l'eventuale avversario penalizzato dalla regola del pareggio
    if (lastAction.wasResetBySbam) {
        let targetPlayer = players.find(p => p.id === lastAction.wasResetBySbam.targetId);
        targetPlayer.score = lastAction.wasResetBySbam.oldScore;
    }

    // Ripristina lo stato del turno e della freccia
    currentPlayer = lastAction.currentPlayerIndex;
    throws = lastAction.throwsState;

    saveGameState();
    updateUI();
    document.getElementById("throwInput").focus();
}

// Fine partita e Schermata Statistiche
function endGame(winner) {
    releaseWakeLock();
    localStorage.removeItem('darts_current_game');

    document.getElementById("game").style.display = "none";
    document.getElementById("statsScreen").style.display = "block";

    document.getElementById("winnerBanner").innerHTML = `
        <h1 style="color:black; margin:0;">🏆 ${winner.name} VINCE! 🏆</h1>
        <p style="margin:5px 0 0 0; font-weight:bold;">Partita completata con successo!</p>
    `;

    // Genera Statistiche Finali ordina per punteggio (più basso è meglio)
    let sortedFinal = [...players].sort((a,b) => a.score - b.score);
    let html = "";
    
    sortedFinal.forEach((p, idx) => {
        let avg = p.totalThrows > 0 ? ((p.initialScore - p.score) / p.totalThrows).toFixed(1) : 0;
        let totalPointsScored = p.initialScore - p.score;
        
        html += `
        <div class="player-card">
            <div class="player-info">
                <div class="player-name">#${idx+1} - ${p.name}</div>
                <div class="player-rank">Tiri Totali: ${p.totalThrows} | Media/Freccia: ${avg}</div>
            </div>
            <div class="score" style="font-size:1.4rem;">${p.score} rimasti</div>
        </div>
        `;
    });
    document.getElementById("statsList").innerHTML = html;
}

// Persistenza Dati (Salvataggio Automatico)
function saveGameState() {
    let state = {
        players: players,
        currentPlayer: currentPlayer,
        throws: throws,
        startPoints: startPoints,
        gameMode: gameMode,
        gameHistory: gameHistory
    };
    localStorage.setItem('darts_current_game', JSON.stringify(state));
}

function loadGameState() {
    let saved = localStorage.getItem('darts_current_game');
    if (saved) {
        let state = JSON.parse(saved);
        if (confirm("È presente una partita interrotta. Vuoi riprenderla?")) {
            players = state.players;
            currentPlayer = state.currentPlayer;
            throws = state.throws;
            startPoints = state.startPoints;
            gameMode = state.gameMode || 'normal';
            gameHistory = state.gameHistory || [];

            document.getElementById("setup").style.display = "none";
            document.getElementById("game").style.display = "block";
            requestWakeLock();
            updateUI();
            return true;
        }
    }
    return false;
}

function exitGame() {
    if(confirm("Vuoi davvero abbandonare la partita corrente?")) {
        localStorage.removeItem('darts_current_game');
        resetToSetup();
    }
}

function resetToSetup() {
    releaseWakeLock();
    document.getElementById("setup").style.display = "block";
    document.getElementById("game").style.display = "none";
    document.getElementById("statsScreen").style.display = "none";
    generatePlayerFields(2);
}

// Inizializzazione al caricamento
window.onload = function() {
    generatePlayerFields(2);
    loadGameState();
};
</script>

</body>
</html>
