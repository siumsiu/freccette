<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Freccette NFC PRO</title>

<style>
:root {
    --bg-dark: #121212;
    --card-bg: #1e1e1e;
    --accent: #00c853;
    --accent-hover: #00e676;
    --danger: #d50000;
    --warning: #ffd600;
    --text: #ffffff;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    text-align: center;
    padding-bottom: 30px;
    user-select: none;
}

.container {
    padding: 15px;
    max-width: 480px;
    margin: auto;
    box-sizing: border-box;
}

h1 { color: var(--accent); margin-bottom: 5px; font-size: 2rem; }
h2 { margin: 15px 0 10px 0; font-size: 1.4rem; }

input, select, button {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    box-sizing: border-box;
    outline: none;
}

input, select {
    background: var(--card-bg);
    color: var(--text);
    border: 2px solid #333;
    text-align: center;
}

button {
    background: var(--accent);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    touch-action: manipulation;
}

button:active { transform: scale(0.95); }
.btn-secondary { background: #333; }
.btn-danger { background: var(--danger); }

.player-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
}

.statusBar {
    background: var(--card-bg);
    padding: 12px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    margin: 10px 0;
    border-left: 5px solid var(--accent);
}

.hint-box {
    background: #2a1b40;
    border-left: 5px solid #b388ff;
    padding: 10px;
    border-radius: 12px;
    font-size: 0.9rem;
    margin: 10px 0;
    color: #e040fb;
    font-weight: bold;
}

.player-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 15px;
}

.player-card {
    background: var(--card-bg);
    padding: 12px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 2px solid transparent;
}

.player-card.current {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0, 200, 83, 0.3);
    background: #232d25;
}

.player-info { text-align: left; }
.player-name { font-size: 1.1rem; font-weight: bold; }
.player-rank { font-size: 0.85rem; color: #aaa; }

.score {
    font-size: 1.8rem;
    font-weight: 900;
    font-family: monospace;
}

/* Tastierino custom */
.custom-keyboard {
    background: #222;
    padding: 10px;
    border-radius: 20px;
    margin-top: 10px;
}

.display-panel {
    background: #000;
    color: var(--accent-hover);
    font-size: 24px;
    font-family: monospace;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-weight: bold;
}

.keyboard-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

.keyboard-grid button {
    margin: 0;
    padding: 15px 5px;
    font-size: 18px;
    background: #333;
}

.keyboard-grid .btn-mod { background: #ff6d00; }
.keyboard-grid .btn-action { background: var(--accent); }

.info-box {
    background: #1a237e;
    border-left: 5px solid #2979ff;
    padding: 12px;
    border-radius: 12px;
    font-size: 0.95rem;
    text-align: left;
    margin: 10px 0;
}
</style>
</head>
<body>

<div class="container">

    <!-- 1. SETUP -->
    <div id="setup">
        <h1>🎯 Freccette NFC</h1>
        
        <label>Modalità di Gioco</label>
        <select id="gameMode" onchange="onModeChange()">
            <option value="normal">Classica</option>
            <option value="tournament">Torneo</option>
            <option value="challenge">Sfida</option>
        </select>

        <div id="modeExplanation" class="info-box" style="display: none;"></div>

        <div id="scoreSetupArea">
            <label>Punteggio iniziale</label>
            <select id="startScorePreset" onchange="toggleCustomScore()">
                <option value="301" selected>301</option>
                <option value="501">501</option>
                <option value="custom">Personalizzato...</option>
            </select>
            <input id="customStartScore" type="number" placeholder="Inserisci punteggio" style="display: none; margin-top: 5px;">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <label style="margin:0;">Giocatori (2-20)</label>
            <button type="button" onclick="adjustPlayers(1)" style="width:50px; padding:8px; margin:0;">+</button>
            <button type="button" onclick="adjustPlayers(-1)" style="width:50px; padding:8px; margin:0;">-</button>
        </div>
        
        <div id="playersNamesContainer" style="margin-top: 10px;"></div>

        <button onclick="startGame()" style="margin-top:20px; background: var(--accent);">Inizia Partita</button>
    </div>

    <!-- 2. GAMEPLAY -->
    <div id="game" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1 id="gameTitle" style="font-size: 1.5rem; margin:0;">🎯 In Corso</h1>
            <button onclick="exitGame()" class="btn-secondary" style="width:auto; margin:0; padding:8px 15px; font-size:14px;">Esci</button>
        </div>

        <div class="statusBar">
            Turno: <span id="currentTurnName" style="color:var(--accent-hover);"></span>
            <span id="arrowProgress" style="float:right; background:#333; padding:2px 8px; border-radius:6px;">1/3</span>
        </div>

        <!-- Box Suggerimenti Dinamici (SBAM / Chiusura) -->
        <div id="hintBox" class="hint-box"></div>

        <h2>Classifica Live</h2>
        <div id="players" class="player-list"></div>

        <!-- TASTIERINO NUMERICO CUSTOM -->
        <div class="custom-keyboard">
            <div id="kybDisplay" class="display-panel">0</div>
            <div class="keyboard-grid">
                <button onclick="pressNum(7)">7</button><button onclick="pressNum(8)">8</button><button onclick="pressNum(9)">9</button><button onclick="pressMod(1)" class="btn-mod" id="mod1">1x</button>
                <button onclick="pressNum(4)">4</button><button onclick="pressNum(5)">5</button><button onclick="pressNum(6)">6</button><button onclick="pressMod(2)" class="btn-mod" id="mod2">2x</button>
                <button onclick="pressNum(1)">1</button><button onclick="pressNum(2)">2</button><button onclick="pressNum(3)">3</button><button onclick="pressMod(3)" class="btn-mod" id="mod3">3x</button>
                <button onclick="pressClear()" class="btn-danger">C</button><button onclick="pressNum(0)">0</button><button onclick="pressUndo()" class="btn-secondary">↩</button><button onclick="pressEnter()" class="btn-action">OK</button>
            </div>
        </div>
    </div>

    <!-- 3. STATISTICHE E PODIO -->
    <div id="statsScreen" style="display:none;">
        <h1 style="color:gold;">🏆 FINE PARTITA 🏆</h1>
        <h2>Classifica Finale</h2>
        <div id="statsList" class="player-list"></div>
        <button onclick="resetToSetup()" style="background: var(--accent); margin-top:20px;">Nuova Partita</button>
    </div>

</div>

<script>
let players = [];
let currentPlayer = 0;
let throws = 0;
let startPoints = 301;
let gameMode = 'normal';
let gameHistory = [];
let podium = [];
let currentModifier = 1;
let currentKybValue = "";

// Lista delle sfide inventate per la modalità "Sfida"
const challenges = [
    { title: "🎯 Cecchino Oscuro", desc: "Avvicinati il più possibile a quota 99 punti senza sballare!", target: 99, check: 'closest' },
    { title: "⚔️ Duello Veloce", desc: "Fai più punti possibili lanciando solo 2 freccette a turno!", target: 0, check: 'maxPoints', maxThrows: 2 },
    { title: "🎰 Triple Overload", desc: "Valgono solo i tiri inseriti con il moltiplicatore 3x!", target: 0, check: 'onlyTriples' },
    { title: "🛑 Chiusura Lampo", desc: "Tutti partono da 120 punti. Chi azzera prima vince!", target: 120, check: 'classic0' }
];
let activeChallenge = null;

function onModeChange() {
    const mode = document.getElementById("gameMode").value;
    const expBox = document.getElementById("modeExplanation");
    const scoreArea = document.getElementById("scoreSetupArea");
    
    expBox.style.display = "block";
    scoreArea.style.display = "block";

    if (mode === "normal") {
        expBox.style.display = "none";
    } else if (mode === "tournament") {
        expBox.innerHTML = "<strong>ℹ️ Torneo:</strong> Modalità a eliminazione. Chi arriva a 0 esce dal tabellone e si posiziona sul podio. Gli altri continuano fino all'ultimo rimasto.";
    } else if (mode === "challenge") {
        scoreArea.style.display = "none";
        // Ne sceglie una a caso ogni volta che si seleziona
        activeChallenge = challenges[Math.floor(Math.random() * challenges.length)];
        expBox.innerHTML = `<strong>🎲 Sfida Estratta: ${activeChallenge.title}</strong><br>${activeChallenge.desc}`;
    }
}

function toggleCustomScore() {
    const preset = document.getElementById("startScorePreset").value;
    const customInput = document.getElementById("customStartScore");
    customInput.style.display = (preset === "custom") ? "block" : "none";
}

function generatePlayerFields(count) {
    const container = document.getElementById("playersNamesContainer");
    container.innerHTML = "";
    let savedNames = JSON.parse(localStorage.getItem('darts_saved_names')) || [];
    for (let i = 0; i < count; i++) {
        const div = document.createElement("div");
        div.className = "player-input-row";
        const input = document.createElement("input");
        input.type = "text";
        input.id = `pName_${i}`;
        input.placeholder = `Giocatore ${i + 1}`;
        input.value = savedNames[i] || `Giocatore ${i + 1}`;
        input.maxLength = 12;
        div.appendChild(input);
        container.appendChild(div);
    }
}

function adjustPlayers(amount) {
    let currentCount = document.querySelectorAll("#playersNamesContainer .player-input-row").length || 2;
    let newCount = currentCount + amount;
    if (newCount >= 2 && newCount <= 20) generatePlayerFields(newCount);
}

function startGame() {
    const fields = document.querySelectorAll("#playersNamesContainer input");
    gameMode = document.getElementById("gameMode").value;
    
    if (gameMode === 'challenge') {
        startPoints = activeChallenge.target > 0 ? activeChallenge.target : 0;
    } else {
        const preset = document.getElementById("startScorePreset").value;
        startPoints = preset === "custom" ? parseInt(document.getElementById("customStartScore").value) : parseInt(preset);
        if (isNaN(startPoints) || startPoints <= 0) { alert("Punteggio non valido"); return; }
    }

    players = []; gameHistory = []; podium = []; currentPlayer = 0; throws = 0;
    let namesToSave = [];

    fields.forEach((field, index) => {
        let name = field.value.trim() || `Giocatore ${index + 1}`;
        namesToSave.push(name);
        players.push({
            id: index, name: name,
            score: (gameMode === 'challenge' && activeChallenge.check === 'maxPoints') ? 0 : startPoints,
            initialScore: startPoints, totalThrows: 0, history: [], isEliminated: false
        });
    });

    localStorage.setItem('darts_saved_names', JSON.stringify(namesToSave));
    document.getElementById("setup").style.display = "none";
    document.getElementById("game").style.display = "block";
    
    if(gameMode === 'challenge') {
        document.getElementById("gameTitle").innerText = "🎲 " + activeChallenge.title;
    } else {
        document.getElementById("gameTitle").innerText = "🎯 In Corso";
    }

    updateUI();
    resetKeyboard();
}

// Genera la scomposizione dei punti in dardi per il tabellone freccette
function getDartCombination(points) {
    if (points <= 0 || points > 180) return "N/D";
    if (points <= 20) return `1x${points}`;
    if (points % 3 === 0 && points <= 60) return `3x${points / 3}`;
    if (points % 2 === 0 && points <= 40) return `2x${points / 2}`;
    
    // Scomposizione base a due/tre freccette per accorciare
    for (let i = 60; i > 0; i -= 3) {
        let diff = points - i;
        if (diff <= 60 && diff % 3 === 0) return `3x${i/3} + 3x${diff/3}`;
        if (diff <= 40 && diff % 2 === 0) return `3x${i/3} + 2x${diff/2}`;
        if (diff <= 20) return `3x${i/3} + 1x${diff}`;
    }
    return `${points} Punti`;
}

// Aggiorna suggerimenti matematici per agganciare o chiudere
function updateHints() {
    const hintBox = document.getElementById("hintBox");
    if (gameMode === 'challenge' && activeChallenge.check !== 'classic0') {
        hintBox.style.display = "none";
        return;
    }
    
    let player = players[currentPlayer];
    
    // Caso 1: Suggerimento di chiusura diretta
    if (player.score <= 60) {
        hintBox.style.display = "block";
        hintBox.innerHTML = `🎯 Per Vincere ora: fare esattamente ${player.score} (${getDartCombination(player.score)})`;
        return;
    }

    // Caso 2: Calcolo distanza dall'avversario per attivare la regola dello SBAM
    let targets = players.filter(p => p.id !== player.id && !p.isEliminated && p.score < player.score);
    if (targets.length > 0) {
        // Trova il più vicino (ovvero quello con il punteggio più alto tra quelli sotto di lui)
        targets.sort((a,b) => b.score - a.score);
        let targetPlayer = targets[0];
        let needed = player.score - targetPlayer.score;
        
        if (needed <= 180) {
            hintBox.style.display = "block";
            hintBox.innerHTML = `⚔️ Per resettare ${targetPlayer.name}: servono ${needed} punti (${getDartCombination(needed)})`;
        } else {
            hintBox.style.display = "none";
        }
    } else {
        hintBox.style.display = "none";
    }
}

function updateUI() {
    if (players.length === 0) return;
    let activePlayer = players[currentPlayer];
    
    document.getElementById("currentTurnName").innerText = activePlayer.name;
    
    let maxArrow = (gameMode === 'challenge' && activeChallenge.maxThrows) ? activeChallenge.maxThrows : 3;
    document.getElementById("arrowProgress").innerText = `Freccia ${throws + 1}/${maxArrow}`;

    // ALGORITMO DI CLASSIFICA LIVE
    let sortedPlayers = [...players].sort((a, b) => {
        if (a.isEliminated && !b.isEliminated) return 1;
        if (!a.isEliminated && b.isEliminated) return -1;
        
        if (gameMode === 'challenge' && activeChallenge.check === 'maxPoints') {
            return b.score - a.score; // Vince chi fa più punti
        }
        return a.score - b.score; // Classica e torneo: vince chi va a zero (punteggio minore)
    });

    let html = "";
    sortedPlayers.forEach((p, idx) => {
        let isCurrent = p.id === activePlayer.id;
        let lbl = p.isEliminated ? "FINE" : `Pos. #${idx + 1}`;
        html += `
        <div class="player-card ${isCurrent ? 'current' : ''}" style="${p.isEliminated ? 'opacity:0.5;' : ''}">
            <div class="player-info">
                <div class="player-name">${p.name} ${isCurrent ? '🎯' : ''}</div>
                <div class="player-rank">${lbl}</div>
            </div>
            <div class="score">${p.isEliminated ? '✅' : p.score}</div>
        </div>
        `;
    });
    document.getElementById("players").innerHTML = html;
    updateHints();
}

/* GESTIONE TASTIERINO NUMERICO CUSTOM */
function pressNum(n) {
    if (currentKybValue.length < 3) {
        currentKybValue += n;
        updateKybDisplay();
    }
}

function pressMod(m) {
    currentModifier = m;
    document.getElementById("mod1").style.background = m === 1 ? "#00c853" : "#333";
    document.getElementById("mod2").style.background = m === 2 ? "#ff6d00" : "#333";
    document.getElementById("mod3").style.background = m === 3 ? "#ff6d00" : "#333";
    updateKybDisplay();
}

function pressClear() {
    currentKybValue = "";
    updateKybDisplay();
}

function updateKybDisplay() {
    let num = parseInt(currentKybValue) || 0;
    let total = num * currentModifier;
    document.getElementById("kybDisplay").innerText = `${num} x ${currentModifier} = ${total}`;
}

function resetKeyboard() {
    currentKybValue = "";
    pressMod(1);
}

function pressEnter() {
    let num = parseInt(currentKybValue) || 0;
    let finalValue = num * currentModifier;

    if (finalValue > 180) {
        alert("Punteggio massimo per lancio singolo è 180!");
        pressClear();
        return;
    }
    
    if (gameMode === 'challenge' && activeChallenge.check === 'onlyTriples' && currentModifier !== 3 && finalValue > 0) {
        alert("In questa sfida valgono solo i cannocchiali Triple (3x)!");
        pressClear();
        return;
    }

    executeThrow(finalValue);
    resetKeyboard();
}

/* LOGICA DI GIOCO */
function executeThrow(value) {
    let player = players[currentPlayer];
    let oldScore = player.score;
    
    gameHistory.push({
        playerId: player.id, scoreBefore: oldScore, throwValue: value,
        throwsState: throws, currentPlayerIndex: currentPlayer, wasResetBySbam: null, modeSpecificFinish: false
    });

    player.totalThrows++;
    player.history.push(value);

    // Gestione calcolo punteggio in base alla modalità
    if (gameMode === 'challenge' && activeChallenge.check === 'maxPoints') {
        player.score += value;
    } else if (gameMode === 'challenge' && activeChallenge.check === 'closest') {
        player.score -= value;
    } else {
        // Modalità Classica e Torneo standard (Logica Rimbalzo su 0)
        let newScore = player.score - value;
        player.score = newScore < 0 ? Math.abs(newScore) : newScore;
    }

    // Controllo chiusura standard a 0
    if ((gameMode === 'normal' || gameMode === 'tournament' || activeChallenge.check === 'classic0') && player.score === 0) {
        player.isEliminated = true;
        podium.push(player);
        gameHistory[gameHistory.length - 1].modeSpecificFinish = true;
        
        alert(`🏆 ${player.name} ha chiuso la sessione!`);
        
        let activeCount = players.filter(p => !p.isEliminated).length;
        if (gameMode === 'normal' || activeCount <= 1) {
            if(activeCount === 1) podium.push(players.find(p => !p.isEliminated));
            endGame();
            return;
        } else {
            moveToNextPlayer();
            updateUI();
            return;
        }
    }

    // Regola dello SBAM (Pareggio) solo nelle modalità a decremento classico
    if (gameMode !== 'challenge' || activeChallenge.check === 'classic0') {
        players.forEach((p) => {
            if (p.id !== player.id && !p.isEliminated && p.score === player.score && player.score !== startPoints) {
                gameHistory[gameHistory.length - 1].wasResetBySbam = { targetId: p.id, oldScore: p.score };
                p.score = startPoints;
                alert(`💥 SBAM! ${player.name} ha accoppiato ${p.name}. ${p.name} ritorna a ${startPoints}!`);
            }
        });
    }

    // Incremento freccette lanciate nel turno corrente
    throws++;
    let maxAllowedThrows = (gameMode === 'challenge' && activeChallenge.maxThrows) ? activeChallenge.maxThrows : 3;
    
    if (throws >= maxAllowedThrows) {
        moveToNextPlayer();
    }
    
    updateUI();
}

function moveToNextPlayer() {
    throws = 0;
    let initialTurn = currentPlayer;
    
    // Gestione fine dei turni globali per le sfide a round fissi (es. Cecchino o Max Punti dopo 3 turni a testa)
    let allFinished = false;
    
    do {
        currentPlayer++;
        if (currentPlayer >= players.length) {
            currentPlayer = 0;
            // Se tutti i giocatori hanno effettuato lo stesso numero di tiri nelle sfide a round
            if (gameMode === 'challenge' && activeChallenge.check !== 'classic0') {
                let firstPlayerThrows = players[0].totalThrows;
                let maxAllowedThrows = activeChallenge.maxThrows || 3;
                if (firstPlayerThrows >= maxAllowedThrows * 3) { // 3 round completi
                    allFinished = true;
                    break;
                }
            }
        }
    } while (players[currentPlayer].isEliminated && currentPlayer !== initialTurn);

    if (allFinished) {
        endGame();
    }
}

function pressUndo() {
    if (gameHistory.length === 0) return;
    let last = gameHistory.pop();
    let player = players.find(p => p.id === last.playerId);

    if (last.modeSpecificFinish) {
        player.isEliminated = false;
        podium.pop();
    }
    player.score = last.scoreBefore;
    player.history.pop();
    player.totalThrows--;

    if (last.wasResetBySbam) {
        let target = players.find(p => p.id === last.wasResetBySbam.targetId);
        target.score = last.wasResetBySbam.oldScore;
    }

    currentPlayer = last.currentPlayerIndex;
    throws = last.throwsState;
    updateUI();
    resetKeyboard();
}

function endGame() {
    document.getElementById("game").style.display = "none";
    document.getElementById("statsScreen").style.display = "block";

    // CREAZIONE DELLA CLASSIFICA FINALE CRITERIATA
    let finalOrder = [];
    if (gameMode === 'tournament') {
        finalOrder = [...podium];
    } else if (gameMode === 'challenge' && activeChallenge.check === 'maxPoints') {
        finalOrder = [...players].sort((a,b) => b.score - a.score);
    } else if (gameMode === 'challenge' && activeChallenge.check === 'closest') {
        // Vince chi è più vicino a 0 (valore assoluto) senza essere andato sotto se sballato
        finalOrder = [...players].sort((a,b) => Math.abs(a.score) - Math.abs(b.score));
    } else {
        finalOrder = [...players].sort((a,b) => a.score - b.score);
    }

    let html = "";
    finalOrder.forEach((p, idx) => {
        let descResult = (gameMode === 'challenge' && activeChallenge.check === 'maxPoints') ? `${p.score} Punti fatti` : `${p.score} Residui`;
        html += `
        <div class="player-card">
            <div class="player-info">
                <div class="player-name">#${idx+1} - ${p.name}</div>
                <div class="player-rank">Lanci: ${p.totalThrows}</div>
            </div>
            <div class="score" style="font-size:1.3rem;">${descResult}</div>
        </div>
        `;
    });
    document.getElementById("statsList").innerHTML = html;
}

function exitGame() {
    if(confirm("Vuoi uscire?")) resetToSetup();
}

function resetToSetup() {
    document.getElementById("setup").style.display = "block";
    document.getElementById("game").style.display = "none";
    document.getElementById("statsScreen").style.display = "none";
    document.getElementById("gameMode").value = "normal";
    onModeChange();
    generatePlayerFields(2);
}

window.onload = function() {
    generatePlayerFields(2);
};
</script>

</body>
</html>
